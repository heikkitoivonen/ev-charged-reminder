name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test

      - name: Decode keystore
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > $GITHUB_WORKSPACE/release.keystore

      - name: Build release APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Build debug APK
        if: github.event_name == 'pull_request'
        run: ./gradlew assembleDebug

      - name: Upload release APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload debug APK
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Publish to latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="1.0.$(git rev-list --count HEAD)"
          mv app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/ev-charged-reminder.apk
          gh release delete latest --yes || true
          git tag -f latest
          git push -f origin latest
          gh release create latest app/build/outputs/apk/release/ev-charged-reminder.apk \
            --title "Latest Build (v${VERSION})" \
            --notes "Version ${VERSION} — automatically built from the latest commit on main." \
            --prerelease
