<svg xmlns="http://www.w3.org/2000/svg" width="432" height="432" viewBox="0 0 108 108">
  <!-- Clip to circular shape (like most launchers) -->
  <defs>
    <clipPath id="circle">
      <circle cx="54" cy="54" r="54" />
    </clipPath>
  </defs>
  <g clip-path="url(#circle)">

    <!-- ===== BACKGROUND ===== -->
    <rect width="108" height="108" fill="#1565C0" />
    <circle cx="54" cy="54" r="48" fill="#1976D2" />
    <circle cx="54" cy="54" r="36" fill="#1E88E5" />

    <!-- ===== FOREGROUND ===== -->

    <!-- Ground line -->
    <rect x="24" y="72" width="60" height="2" fill="#0D47A1" />

    <!-- Car body -->
    <path d="M26,62 L26,54 C26,52 27,51 29,51 L40,51 L44,44 C45,42 47,41 49,41 L63,41 C65,41 67,42 68,44 L72,51 L75,51 C77,51 78,52 78,54 L78,62 L78,66 C78,68 76,69 74,69 L30,69 C28,69 26,68 26,66 Z" fill="#E3F2FD" />

    <!-- Car roof / window area -->
    <path d="M45,50 L48,44 C48.5,43 49.5,42.5 50,42.5 L62,42.5 C63,42.5 64,43 64.5,44 L68,50 Z" fill="#BBDEFB" />

    <!-- Front window -->
    <path d="M46,49 L49,44 C49.3,43.4 50,43.2 50.5,43.2 L55,43.2 L55,49 Z" fill="#42A5F5" />

    <!-- Rear window -->
    <path d="M56,43.2 L62,43.2 C62.8,43.2 63.5,43.6 63.8,44 L67,49 L56,49 Z" fill="#42A5F5" />

    <!-- Front wheel -->
    <circle cx="36" cy="69" r="5" fill="#0D47A1" />
    <circle cx="36" cy="69" r="2.5" fill="#90CAF9" />

    <!-- Rear wheel -->
    <circle cx="68" cy="69" r="5" fill="#0D47A1" />
    <circle cx="68" cy="69" r="2.5" fill="#90CAF9" />

    <!-- Headlight -->
    <rect x="77" y="55" width="2" height="4" fill="#FDD835" />

    <!-- Taillight -->
    <rect x="26" y="55" width="2" height="4" fill="#EF5350" />

    <!-- Charging cable -->
    <path d="M78,56 Q82,56 82,50 Q82,46 83,44" stroke="#78909C" stroke-width="2" fill="none" />

    <!-- Charge port on car -->
    <circle cx="78" cy="56" r="1.5" fill="#4CAF50" />

    <!-- Charger post body -->
    <rect x="80" y="34" width="6" height="38" fill="#CFD8DC" />

    <!-- Post top cap -->
    <rect x="79" y="32" width="8" height="3" fill="#90A4AE" />

    <!-- Screen on charger -->
    <rect x="81" y="37" width="4" height="7" fill="#4CAF50" />

    <!-- Lightning bolt -->
    <path d="M51,26 L47,36 L52,36 L48,46 L59,33 L54,33 L57,26 Z" fill="#FDD835" />
    <path d="M51,26 L47,36 L52,36 L48,46 L59,33 L54,33 L57,26 Z" stroke="#F9A825" stroke-width="0.5" fill="none" />

    <!-- Notification bell body -->
    <path d="M31,34 C31,30 33,27 36,26 L36,25 C36,23.5 37,22.5 38,22.5 C39,22.5 40,23.5 40,25 L40,26 C43,27 45,30 45,34 L45,38 L46,40 L30,40 L31,38 Z" fill="#FDD835" />

    <!-- Bell clapper -->
    <circle cx="38" cy="41" r="1.5" fill="#F9A825" />

  </g>
</svg>
